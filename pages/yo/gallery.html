        body {

    <script>
        // Pipes.sh style animation
        function initPipes() {
            const canvas = document.getElementById('pipes-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const colors = ['#ff3366', '#ffcc00', '#ff6600', '#00ff88', '#00ccff', '#ff00ff'];
            const pipes = [];
            const maxPipes = 6;
            
            class Pipe {
                constructor() {
                    this.reset();
                }
                
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.direction = Math.floor(Math.random() * 4); // 0=up, 1=right, 2=down, 3=left
                    this.speed = 3;
                    this.thickness = 3 + Math.random() * 4;
                    this.turnChance = 0.02;
                    this.length = 0;
                    this.maxLength = 500 + Math.random() * 1000;
                }
                
                update() {
                    const prevX = this.x;
                    const prevY = this.y;
                    
                    // Move in current direction
                    switch(this.direction) {
                        case 0: this.y -= this.speed; break;
                        case 1: this.x += this.speed; break;
                        case 2: this.y += this.speed; break;
                        case 3: this.x -= this.speed; break;
                    }
                    
                    // Draw pipe segment
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = this.thickness;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(prevX, prevY);
                    ctx.lineTo(this.x, this.y);
                    ctx.stroke();
                    
                    // Random turn
                    if (Math.random() < this.turnChance) {
                        // Turn 90 degrees
                        this.direction = (this.direction + (Math.random() > 0.5 ? 1 : 3)) % 4;
                        
                        // Draw corner
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.thickness / 2, 0, Math.PI * 2);
                        ctx.fillStyle = this.color;
                        ctx.fill();
                    }
                    
                    this.length += this.speed;
                    
                    // Reset if out of bounds or max length
                    if (this.x < -50 || this.x > canvas.width + 50 || 
                        this.y < -50 || this.y > canvas.height + 50 ||
                        this.length > this.maxLength) {
                        this.reset();
                    }
                }
            }
            
            // Create initial pipes
            for (let i = 0; i < maxPipes; i++) {
                pipes.push(new Pipe());
            }
            
            // Animation loop
            function animate() {
                // Fade effect
                ctx.fillStyle = 'rgba(26, 26, 46, 0.03)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                pipes.forEach(pipe => pipe.update());
                requestAnimationFrame(animate);
            }
            
            // Clear and start
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            animate();
            
            // Handle resize
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }
        
        // Create gallery with XP windows
        function createGallery() {
            const grid = document.getElementById('galleryGrid');
            const totalImages = 27;
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            
            // Define positions around the screen edges and corners
            const positions = [
                // Left side
                { x: 20, y: 50 }, { x: 40, y: 200 }, { x: 30, y: 350 }, { x: 50, y: 500 }, { x: 25, y: 650 },
                // Right side
                { x: vw - 220, y: 80 }, { x: vw - 240, y: 230 }, { x: vw - 200, y: 380 }, { x: vw - 230, y: 530 }, { x: vw - 210, y: 680 },
                // Top
                { x: 250, y: 30 }, { x: 450, y: 50 }, { x: 650, y: 40 }, { x: 850, y: 60 },
                // Bottom
                { x: 200, y: vh - 200 }, { x: 400, y: vh - 180 }, { x: 600, y: vh - 190 }, { x: 800, y: vh - 170 },
                // Corners and scattered
                { x: 150, y: 120 }, { x: vw - 350, y: 120 }, { x: 180, y: vh - 280 }, { x: vw - 380, y: vh - 280 },
                // More overlap around center area edges
                { x: 280, y: 180 }, { x: vw - 420, y: 200 }, { x: 320, y: vh - 320 }, { x: vw - 450, y: vh - 300 },
                { x: 100, y: 280 }, { x: vw - 280, y: 300 }
            ];
            
            for (let i = 1; i <= totalImages; i++) {
                const win = document.createElement('div');
                win.className = 'xp-window';
                
                // Base size increased by 10px (130-220px)
                let randomWidth = 130 + Math.random() * 90;
                let aspectRatio = '4/3';
                
                // Make 5 images wider
                if (i <= 5) {
                    randomWidth = 200 + Math.random() * 60;
                    aspectRatio = '16/9';
                }
                // Make 5 images taller
                else if (i > 5 && i <= 10) {
                    randomWidth = 140 + Math.random() * 40;
                    aspectRatio = '3/4';
                }
                // Make 5 images bigger overall
                else if (i > 10 && i <= 15) {
                    randomWidth = 220 + Math.random() * 50;
                }
                
                win.style.width = randomWidth + 'px';
                win.dataset.aspect = aspectRatio;
                
                // Use predefined positions with randomness
                const pos = positions[(i - 1) % positions.length];
                const randomX = pos.x + (Math.random() - 0.5) * 60;
                const randomY = pos.y + (Math.random() - 0.5) * 40;
                win.style.left = Math.max(10, Math.min(randomX, vw - 150)) + 'px';
                win.style.top = Math.max(10, Math.min(randomY, vh - 150)) + 'px';
                
                // Random rotation
                const rotation = (Math.random() - 0.5) * 12;
                win.style.transform = `rotate(${rotation}deg)`;
                
                // Random z-index for overlap effect (higher for edges)
                win.style.zIndex = Math.floor(Math.random() * 40);
                
                // Create title bar
                const titlebar = document.createElement('div');
                titlebar.className = 'xp-titlebar';
                
                const title = document.createElement('span');
                title.className = 'xp-title';
                title.textContent = `photo_${i}.jpg`;
                
                const buttons = document.createElement('div');
                buttons.className = 'xp-buttons';
                
                // Minimize button
                const minBtn = document.createElement('div');
                minBtn.className = 'xp-btn';
                minBtn.innerHTML = '_';
                minBtn.onclick = (e) => {
                    e.stopPropagation();
                    win.classList.toggle('minimized');
                };
                
                // Maximize button
                const maxBtn = document.createElement('div');
                maxBtn.className = 'xp-btn';
                maxBtn.innerHTML = '□';
                maxBtn.onclick = (e) => {
                    e.stopPropagation();
                    win.classList.toggle('maximized');
                };
                
                // Close button
                const closeBtn = document.createElement('div');
                closeBtn.className = 'xp-btn close';
                closeBtn.innerHTML = 'X';
                closeBtn.onclick = (e) => {
                    e.stopPropagation();
                    win.style.transition = 'opacity 0.3s, transform 0.3s';
                    win.style.opacity = '0';
                    win.style.transform = 'scale(0.8)';
                    setTimeout(() => win.remove(), 300);
                };
                
                buttons.appendChild(minBtn);
                buttons.appendChild(maxBtn);
                buttons.appendChild(closeBtn);
                titlebar.appendChild(title);
                titlebar.appendChild(buttons);
                
                // Create content area
                const content = document.createElement('div');
                content.className = 'xp-content';
                content.onclick = () => openLightbox(i);
                
                const img = document.createElement('img');
                img.src = `/myimages/${i}.jpg`;
                img.alt = `Photo ${i}`;
                img.loading = 'lazy';
                
                content.appendChild(img);
                win.appendChild(titlebar);
                win.appendChild(content);
                grid.appendChild(win);
            }
        }
        
        // Lightbox functionality
        function openLightbox(imageNum) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImage');
            lightboxImg.src = `/myimages/${imageNum}.jpg`;
            lightbox.classList.add('active');
        }
        
        // Close lightbox
        document.getElementById('lightbox').onclick = function() {
            this.classList.remove('active');
        };
        
        // Initialize
        initPipes();
        createGallery();
    </script>
