<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mis dibujos :: capi_nemoo</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
    <link rel="stylesheet" href="/assets/css/tilde-style.css">
    <style>
        body {
            background: #0a0a0f;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Scanlines effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.1) 0px,
                rgba(0,0,0,0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }
        
        /* Back navigation */
        .back-nav {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }
        
        .back-nav a {
            color: #ffffff;
            text-decoration: none;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 8px 15px;
            background: rgba(10,10,15,0.9);
            border: 2px solid #00d4ff;
            display: inline-block;
            transition: all 0.2s;
        }
        
        .back-nav a:hover {
            background: #00d4ff;
            color: #0a0a0f;
            border-color: #ffffff;
        }
        
        /* Main container */
        .dibujos-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 40px 60px;
        }
        
        /* Header */
        .page-header {
            text-align: center;
            margin-bottom: 50px;
            padding: 30px;
            background: linear-gradient(135deg, rgba(0,212,255,0.05) 0%, rgba(15,15,20,0.95) 100%);
            border: 2px solid #2a2a35;
        }
        
        .page-header h1 {
            font-family: 'Courier New', monospace;
            font-size: 48px;
            color: #ffffff;
            margin: 0 0 10px;
            text-shadow: 0 0 20px rgba(0,212,255,0.5), 2px 2px 0 #00d4ff;
            letter-spacing: 4px;
        }
        
        .page-header .subtitle {
            font-family: 'Courier New', monospace;
            color: #999;
            font-size: 14px;
        }
        
        .page-header .subtitle span {
            color: #00d4ff;
        }
        
        /* Category filter */
        .category-filter {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #333;
            color: #7ec8e3;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .filter-btn:hover {
            border-color: #00d4ff;
            color: #00d4ff;
            background: rgba(0,212,255,0.1);
        }
        
        .filter-btn.active {
            border-color: #ffffff;
            color: #ffffff;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        
        /* Gallery grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }
        
        /* Artwork card */
        .artwork-card {
            background: #12121a;
            border: 1px solid #2a2a35;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .artwork-card:hover {
            border-color: #00d4ff;
            box-shadow: 0 0 25px rgba(0,212,255,0.3);
            transform: translateY(-5px);
        }
        
        .artwork-card.hidden {
            display: none;
        }
        
        /* Card header */
        .card-header {
            background: linear-gradient(to bottom, #1a1a22 0%, #12121a 100%);
            padding: 10px 15px;
            border-bottom: 1px solid #2a2a35;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-title {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #ffffff;
            margin: 0;
        }
        
        .card-category {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #00d4ff;
            background: rgba(0,212,255,0.15);
            padding: 3px 8px;
            border-radius: 3px;
            text-transform: uppercase;
        }
        
        /* Artwork image */
        .artwork-image {
            position: relative;
            cursor: pointer;
            overflow: hidden;
            background: #0a0a0f;
        }
        
        .artwork-image img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
            transition: transform 0.3s;
        }
        
        .artwork-card:hover .artwork-image img {
            transform: scale(1.05);
        }
        
        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .artwork-image:hover .image-overlay {
            opacity: 1;
        }
        
        .view-btn {
            font-family: 'Courier New', monospace;
            color: #ffffff;
            font-size: 14px;
            padding: 10px 25px;
            border: 2px solid #00d4ff;
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .view-btn:hover {
            background: #00d4ff;
            color: #0a0a0f;
        }
        
        /* Card info */
        .card-info {
            padding: 15px;
            border-bottom: 1px dashed #2a2a35;
        }
        
        .card-date {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .card-date::before {
            content: '📅 ';
        }
        
        .card-description {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
            margin: 0;
        }
        
        /* Comment section */
        .comment-section {
            padding: 15px;
            background: rgba(0,0,0,0.3);
        }
        
        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .comment-label {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .comment-count {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #666;
        }
        
        .artist-comment {
            background: rgba(0,212,255,0.05);
            border-left: 3px solid #00d4ff;
            padding: 12px 15px;
            margin-bottom: 10px;
        }
        
        .artist-comment .comment-author {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #00d4ff;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        .artist-comment .comment-text {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #ccc;
            line-height: 1.5;
            font-style: italic;
        }
        
        /* Tags */
        .card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 10px 15px;
            border-top: 1px dashed #2a2a35;
        }
        
        .tag {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #888;
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border: 1px solid #2a2a35;
            text-transform: lowercase;
        }
        
        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 40px;
        }
        
        .lightbox.active {
            display: flex;
        }
        
        .lightbox-content {
            max-width: 90%;
            max-height: 80vh;
            position: relative;
        }
        
        .lightbox-content img {
            max-width: 100%;
            max-height: 75vh;
            border: 3px solid #00d4ff;
            box-shadow: 0 0 60px rgba(0,212,255,0.4);
        }
        
        .lightbox-info {
            text-align: center;
            margin-top: 20px;
            max-width: 600px;
        }
        
        .lightbox-title {
            font-family: 'Courier New', monospace;
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 10px;
        }
        
        .lightbox-comment {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #ccc;
            font-style: italic;
            line-height: 1.6;
        }
        
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: #ffffff;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: color 0.2s;
        }
        
        .lightbox-close:hover {
            color: #00d4ff;
        }
        
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 50px;
            color: #ffffff;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: color 0.2s;
            user-select: none;
        }
        
        .lightbox-nav:hover {
            color: #00d4ff;
        }
        
        .lightbox-nav.prev {
            left: 20px;
        }
        
        .lightbox-nav.next {
            right: 20px;
        }
        
        /* Stats bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #2a2a35;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-family: 'Courier New', monospace;
            font-size: 32px;
            color: #00d4ff;
            display: block;
            text-shadow: 0 0 10px rgba(0,212,255,0.5);
        }
        
        .stat-label {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Footer */
        .page-footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            border-top: 1px solid #2a2a35;
        }
        
        .footer-text {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #666;
        }
        
        .footer-text span {
            color: #00d4ff;
        }
        
        /* Sort dropdown */
        .sort-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        
        .sort-select {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 8px 15px;
            background: #12121a;
            border: 1px solid #2a2a35;
            color: #888;
            cursor: pointer;
        }
        
        .sort-select:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .dibujos-container {
                padding: 70px 20px 40px;
            }
            
            .page-header h1 {
                font-size: 32px;
            }
            
            .gallery-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-bar {
                flex-wrap: wrap;
                gap: 20px;
            }
            
            .lightbox-nav {
                font-size: 30px;
            }
            
            .lightbox-nav.prev {
                left: 10px;
            }
            
            .lightbox-nav.next {
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Back navigation -->
    <div class="back-nav">
        <a href="/index.html">← back home</a>
    </div>
    
    <div class="dibujos-container">
        <!-- Header -->
        <header class="page-header">
            <h1>✏️ MY ARTTY ✏️</h1>
            <p class="subtitle">my drawings, sketches, paintings & digital art </p>
        </header>
        
        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-number" id="totalCount">0</span>
                <span class="stat-label">total works</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="sketchCount">0</span>
                <span class="stat-label">sketches</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="paintingCount">0</span>
                <span class="stat-label">paintings</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="digitalCount">0</span>
                <span class="stat-label">digital</span>
            </div>
        </div>
        
        <!-- Category filter -->
        <div class="category-filter">
            <button class="filter-btn active" data-category="all">[ ALL ]</button>
            <button class="filter-btn" data-category="sketch">[ SKETCHES ]</button>
            <button class="filter-btn" data-category="painting">[ PAINTINGS ]</button>
            <button class="filter-btn" data-category="digital">[ DIGITAL ]</button>
            <button class="filter-btn" data-category="traditional">[ TRADITIONAL ]</button>
        </div>
        
        <!-- Sort -->
        <div class="sort-container">
            <select class="sort-select" id="sortSelect">
                <option value="newest">Sort: Newest First</option>
                <option value="oldest">Sort: Oldest First</option>
                <option value="name">Sort: A-Z</option>
            </select>
        </div>
        
        <!-- Gallery grid -->
        <div class="gallery-grid" id="galleryGrid">
            <!-- Artwork cards will be generated by JavaScript -->
        </div>
        
        <!-- Footer -->
        <footer class="page-footer">
            <p class="footer-text">
                all artwork © capi_nemoo <span>♥</span> unauthorized use approved<br>
            </p>
        </footer>
    </div>
    
    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <span class="lightbox-nav prev" onclick="navigateLightbox(-1)">&#10094;</span>
        <span class="lightbox-nav next" onclick="navigateLightbox(1)">&#10095;</span>
        <div class="lightbox-content">
            <img src="" alt="" id="lightboxImage">
            <div class="lightbox-info">
                <h3 class="lightbox-title" id="lightboxTitle"></h3>
                <p class="lightbox-comment" id="lightboxComment"></p>
            </div>
        </div>
    </div>
    
    <script>
        // Artwork data - Add your artworks here!
        // Each artwork has: id, title, image, category, date, description, comment, tags
        const artworks = [
            {
                id: 1,

            },

            {

            },
            {
                id: 5,
                title: "Paisaje de memoria",
                image: "/dibujos/5.jpg",
                category: "traditional",
                date: "2023-12-15",
                description: "Watercolor landscape from imagination",
                comment: "Pinté esto recordando un lugar de mi infancia. Los colores no son exactos, pero la sensación sí.",
                tags: ["watercolor", "landscape", "memory"]
            },
            {
                id: 6,
                title: "Character concept #12",
                image: "/dibujos/6.jpg",
                category: "digital",
                date: "2024-02-28",
                description: "Character design for personal project",
                comment: "Diseño de personaje para un proyecto personal. Quería algo entre lo retro y lo futurista.",
                tags: ["character design", "concept art", "sci-fi"]
            },
            {
                id: 7,
                title: "Tinta y café",
                image: "/dibujos/7.jpg",

                date: "2024-01-25",
                description: "Ink drawing with coffee wash",
                comment: "Experimento con tinta china y café frío como wash. El resultado tiene un tono sepia muy bonito.",
                tags: ["ink", "coffee", "experimental"]
            },
            {
                id: 8,
                title: "Autorretrato abstracto",
                image: "/dibujos/8.jpg",
                category: "painting",
                date: "2024-03-20",
                description: "Abstract self-portrait in acrylics",
                comment: "No quería un autorretrato literal. Busqué representar cómo me siento más que cómo me veo.",
                tags: ["abstract", "self-portrait", "acrylic"]
            },
            {
                id: 9,
                title: "Fauna local",
                image: "/dibujos/9.jpg",
                category: "sketch",
                date: "2024-02-14",
                description: "Studies of local birds",
                comment: "Salí al parque con mi cuaderno. Los pájaros no se quedan quietos pero eso es parte del reto.",
                tags: ["birds", "nature", "field sketch"]
            },
            {
                id: 10,
                title: "Pixel nostalgia",
                image: "/dibujos/10.jpg",
                category: "digital",
                date: "2024-01-05",
                description: "Pixel art inspired by 90s games",
                comment: "Homenaje a los juegos que jugaba de niño. Cada pixel colocado con cariño y nostalgia.",
                tags: ["pixel art", "retro", "gaming"]
            },
            {
                id: 11,
                title: "Flores marchitas",
                image: "/dibujos/11.jpg",
                category: "painting",
                date: "2023-11-30",
                description: "Still life - wilting flowers",
                comment: "Hay algo hermoso en las flores cuando empiezan a marchitarse. Los colores se vuelven más complejos.",
                tags: ["still life", "flowers", "oil"]
            },
            {
                id: 12,
                title: "Diseño de criatura",
                image: "/dibujos/12.jpg",
                category: "digital",
                date: "2024-03-10",
                description: "Creature design exploration",
                comment: "Quería crear algo que pareciera real pero que claramente no existe. Biología fantástica.",
                tags: ["creature design", "fantasy", "concept"]
            }
        ];
        
        let currentLightboxIndex = 0;
        let filteredArtworks = [...artworks];
        
        // Initialize gallery
        function initGallery() {
            updateStats();
            renderGallery(artworks);
            setupFilters();
            setupSort();
        }
        
        // Update stats
        function updateStats() {
            document.getElementById('totalCount').textContent = artworks.length;
            document.getElementById('sketchCount').textContent = artworks.filter(a => a.category === 'sketch').length;
            document.getElementById('paintingCount').textContent = artworks.filter(a => a.category === 'painting').length;
            document.getElementById('digitalCount').textContent = artworks.filter(a => a.category === 'digital').length;
        }
        
        // Render gallery
        function renderGallery(artworksToRender) {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            
            artworksToRender.forEach((artwork, index) => {
                const card = document.createElement('div');
                card.className = 'artwork-card';
                card.dataset.category = artwork.category;
                card.dataset.index = index;
                
                card.innerHTML = `
                    <div class="card-header">
                        <h3 class="card-title">${artwork.title}</h3>
                        <span class="card-category">${artwork.category}</span>
                    </div>
                    <div class="artwork-image" onclick="openLightbox(${index})">
                        <img src="${artwork.image}" alt="${artwork.title}" loading="lazy" 
                             onerror="this.src='/assets/images/placeholder.svg'">
                        <div class="image-overlay">
                            <button class="view-btn">[ VIEW FULL ]</button>
                        </div>
                    </div>
                    <div class="card-info">
                        <p class="card-date">${formatDate(artwork.date)}</p>
                        <p class="card-description">${artwork.description}</p>
                    </div>
                    <div class="comment-section">
                        <div class="comment-header">
                            <span class="comment-label">💬 Artist's Note</span>
                        </div>
                        <div class="artist-comment">
                            <p class="comment-author">capi_nemoo says:</p>
                            <p class="comment-text">"${artwork.comment}"</p>
                        </div>
                    </div>
                    <div class="card-tags">
                        ${artwork.tags.map(tag => `<span class="tag">#${tag}</span>`).join('')}
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }
        
        // Format date
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }
        
        // Setup filters
        function setupFilters() {
            const filterBtns = document.querySelectorAll('.filter-btn');
            
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Update active state
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // Filter artworks
                    const category = btn.dataset.category;
                    if (category === 'all') {
                        filteredArtworks = [...artworks];
                    } else {
                        filteredArtworks = artworks.filter(a => a.category === category);
                    }
                    
                    // Apply current sort
                    applySortToFiltered();
                    renderGallery(filteredArtworks);
                });
            });
        }
        
        // Setup sort
        function setupSort() {
            const sortSelect = document.getElementById('sortSelect');
            sortSelect.addEventListener('change', () => {
                applySortToFiltered();
                renderGallery(filteredArtworks);
            });
        }
        
        // Apply sort
        function applySortToFiltered() {
            const sortValue = document.getElementById('sortSelect').value;
            
            switch(sortValue) {
                case 'newest':
                    filteredArtworks.sort((a, b) => new Date(b.date) - new Date(a.date));
                    break;
                case 'oldest':
                    filteredArtworks.sort((a, b) => new Date(a.date) - new Date(b.date));
                    break;
                case 'name':
                    filteredArtworks.sort((a, b) => a.title.localeCompare(b.title));
                    break;
            }
        }
        
        // Lightbox functions
        function openLightbox(index) {
            currentLightboxIndex = index;
            const artwork = filteredArtworks[index];
            
            document.getElementById('lightboxImage').src = artwork.image;
            document.getElementById('lightboxTitle').textContent = artwork.title;
            document.getElementById('lightboxComment').textContent = `"${artwork.comment}"`;
            document.getElementById('lightbox').classList.add('active');
            
            document.body.style.overflow = 'hidden';
        }
        
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }
        
        function navigateLightbox(direction) {
            currentLightboxIndex += direction;
            
            if (currentLightboxIndex < 0) {
                currentLightboxIndex = filteredArtworks.length - 1;
            } else if (currentLightboxIndex >= filteredArtworks.length) {
                currentLightboxIndex = 0;
            }
            
            const artwork = filteredArtworks[currentLightboxIndex];
            document.getElementById('lightboxImage').src = artwork.image;
            document.getElementById('lightboxTitle').textContent = artwork.title;
            document.getElementById('lightboxComment').textContent = `"${artwork.comment}"`;
        }
        
        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('lightbox').classList.contains('active')) {
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') navigateLightbox(-1);
                if (e.key === 'ArrowRight') navigateLightbox(1);
            }
        });
        
        // Click outside to close lightbox
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') closeLightbox();
        });
        
        // Initialize on load
        document.addEventListener('DOMContentLoaded', initGallery);
    </script>
</body>
</html>
